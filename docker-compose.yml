version: '3.8'

services:
  # --- THE BRAIN: Hybrid AI Router ---
  hybrid-router:
    build: .
    container_name: hybrid-ai-router
    restart: always
    volumes:
      - ./secrets:/app/secrets
    networks:
      - ai-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect(('localhost', 7860))"]
      interval: 30s
      timeout: 10s
      retries: 3



  # --- THE FACE: Open WebUI ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"
    environment:
      - ENABLE_OLLAMA_API=False
      - WEBUI_SECRET_KEY=antigravity_secret_key_2026
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  open-webui-data:
